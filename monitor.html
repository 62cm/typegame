    <style>
      :root {
        --desk: #1a1410;
        --bezel: #1c1c1e;
        --screen: #0b1210;
        --phosphor: #9af0c0;
        --phosphor-dim: #3d6b52;
        --danger: #c23b3b;
        --text: #d8d2c8;
        --muted: #8a8074;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #050506;
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      /* Room: you face the monitor; ghost stays behind (reflections / periphery only) */
      #room {
        position: relative;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(ellipse 90% 60% at 50% 0%, #1a1010 0%, transparent 55%),
          linear-gradient(180deg, #0c0c10 0%, #15110e 48%, #1a1410 100%);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      /* Peripheral shadow of something behind you 鈥?never a face in front */
      #behind-presence {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: transparent;
        transition: background 0.2s linear;
      }
      #behind-presence::before,
      #behind-presence::after {
        content: "";
        position: absolute;
        top: 0;
        width: 18%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.2s linear;
        filter: blur(10px);
      }
      #behind-presence::before {
        left: 0;
        background: linear-gradient(90deg, rgba(20, 0, 0, 0.85), transparent);
      }
      #behind-presence::after {
        right: 0;
        background: linear-gradient(270deg, rgba(20, 0, 0, 0.85), transparent);
      }

      #desk {
        position: relative;
        z-index: 2;
        width: min(920px, 96vw);
        transform-origin: center center;
      }

      #monitor {
        background: linear-gradient(180deg, #2a2a2e, #141416);
        border-radius: 14px 14px 8px 8px;
        padding: 18px 18px 14px;
        box-shadow:
          0 0 0 2px #0a0a0a,
          0 24px 60px rgba(0, 0, 0, 0.65),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      #bezel {
        background: #050806;
        border-radius: 6px;
        padding: 12px;
        border: 1px solid #222;
        position: relative;
      }

      /* Glass reflection: faint silhouette "behind you" appears ON the glass */
      #glass-reflection {
        position: absolute;
        inset: 12px;
        border-radius: 4px;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        background:
          radial-gradient(ellipse 40% 70% at 50% 110%, rgba(200, 200, 200, 0.18), transparent 70%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 40%);
        mix-blend-mode: screen;
        transition: opacity 0.15s linear;
      }
      #glass-reflection .head {
        position: absolute;
        left: 50%;
        bottom: -8%;
        width: 42%;
        height: 55%;
        transform: translateX(-50%);
        background: radial-gradient(ellipse at 50% 30%, rgba(220, 220, 220, 0.22), transparent 68%);
        filter: blur(1px);
      }
      #glass-reflection .eyes {
        position: absolute;
        left: 50%;
        top: 38%;
        width: 28%;
        height: 8px;
        transform: translateX(-50%);
        display: flex;
        justify-content: space-between;
      }
      #glass-reflection .eyes i {
        display: block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(180, 30, 30, 0.55);
        box-shadow: 0 0 8px rgba(180, 30, 30, 0.45);
      }

      #screen {
        position: relative;
        background: var(--screen);
        min-height: min(58vh, 520px);
        max-height: min(58vh, 520px);
        overflow: hidden;
        border-radius: 3px;
        box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.55);
      }
      #screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 2px,
          rgba(0, 0, 0, 0.12) 2px,
          rgba(0, 0, 0, 0.12) 3px
        );
        opacity: 0.35;
        z-index: 4;
      }

      #screen-chrome {
        display: flex;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 11px;
        color: var(--phosphor-dim);
        border-bottom: 1px solid #143022;
        font-family: Consolas, "Cascadia Mono", monospace;
      }
      #screen-chrome b {
        color: var(--phosphor);
        font-weight: 600;
      }
      #screen-chrome .bad b {
        color: #f08080;
      }

      #article-wrap {
        height: calc(100% - 34px);
        overflow: hidden;
        position: relative;
      }
      #article {
        padding: 14px 16px 120px;
        color: var(--phosphor);
        font-size: 17px;
        line-height: 1.75;
        font-family: "Microsoft YaHei UI", "PingFang SC", serif;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #article .done {
        color: #6fbf8f;
      }
      #article .current {
        background: rgba(154, 240, 192, 0.16);
        outline: 1px solid rgba(154, 240, 192, 0.35);
      }
      #article .todo {
        color: var(--phosphor-dim);
      }

      #stand {
        width: 90px;
        height: 18px;
        margin: 0 auto;
        background: #111;
        border-radius: 0 0 4px 4px;
      }
      #base {
        width: 220px;
        height: 12px;
        margin: 0 auto;
        background: #0d0d0d;
        border-radius: 0 0 8px 8px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }
      #desk-wood {
        margin-top: 10px;
        height: 70px;
        background: linear-gradient(180deg, #2a2018, #1a1410 60%, #120e0c);
        border-radius: 4px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        padding: 12px 14px 10px;
      }

      #typed-label {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      #typed-box {
        min-height: 1.6em;
        margin-bottom: 8px;
        font-size: 14px;
        color: #c8c2b8;
        word-break: break-word;
      }
      #typed-box .ok {
        color: #8fbf8f;
      }
      #typed-box .bad {
        color: #ff8a8a;
        text-decoration: underline;
      }
      #typed-box .composing {
        color: #d4c48a;
        border-bottom: 1px dashed #8a7a40;
      }
      #typed-box .placeholder {
        color: #555;
      }

      #type-input {
        width: 100%;
        padding: 10px 12px;
        font-size: 16px;
        color: var(--text);
        background: #0c0a09;
        border: 1px solid #3a322c;
        outline: none;
        font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      }
      #type-input:focus {
        border-color: #8a4030;
      }

      #timer-bar {
        margin-top: 8px;
        height: 3px;
        background: #2a2220;
      }
      #timer-fill {
        height: 100%;
        background: var(--danger);
        transform-origin: left center;
      }

      #lock-note {
        position: absolute;
        left: 50%;
        top: 14px;
        transform: translateX(-50%);
        z-index: 6;
        font-size: 12px;
        letter-spacing: 0.12em;
        color: var(--muted);
        text-shadow: 0 1px 4px #000;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.84);
        display: grid;
        place-items: center;
        z-index: 20;
      }
      .overlay.hidden {
        display: none;
      }
      .card {
        width: min(480px, calc(100vw - 32px));
        background: #101012;
        border: 1px solid #2a2a2e;
        padding: 24px;
      }
      .card h1,
      .card h2 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      .card p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }
      button {
        appearance: none;
        border: 1px solid #3a3a40;
        background: #1c1c22;
        color: var(--text);
        padding: 9px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      button.primary {
        background: #2a1818;
        border-color: #8a3030;
      }
    </style>

      const els = {
        overlay: document.getElementById("overlay"),
        gameover: document.getElementById("gameover"),
        clear: document.getElementById("clear"),
        article: document.getElementById("article"),
        articleWrap: document.getElementById("article-wrap"),
        typedBox: document.getElementById("typed-box"),
        typeInput: document.getElementById("type-input"),
        wave: document.getElementById("wave"),
        cleared: document.getElementById("cleared"),
        ghostCount: document.getElementById("ghost-count"),
        proximity: document.getElementById("proximity"),
        timeLeft: document.getElementById("time-left"),
        timerFill: document.getElementById("timer-fill"),
        presence: document.getElementById("behind-presence"),
        glass: document.getElementById("glass-reflection"),
        desk: document.getElementById("desk"),
        goMsg: document.getElementById("go-msg"),
      };

      const state = {
        running: false,
        wave: 1,
        cleared: 0,
        text: "",
        index: 0,
        typed: "",
        composing: "",
        ghosts: 1,
        near: 0.14,
        time: 0,
        timeMax: 0,
        streak: 0,
        wrongFlash: 0,
        imeComposing: false,
        lastJudged: "",
      };

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function proximityLabel(n) {
        if (n < 0.22) return "鍦ㄥ瑙?;
        if (n < 0.4) return "鍦ㄦ埧闂撮噷";
        if (n < 0.58) return "闈犺繎妞呰儗";
        if (n < 0.78) return "璐寸潃鍚庨";
        return "浼告墜鍙強";
      }

      function pickText() {
        return CHAPTERS[(state.wave - 1 + state.cleared) % CHAPTERS.length];
      }

      function timeFor(text) {
        const cps = Math.max(1.15, 1.65 - state.wave * 0.06);
        return Math.min(120, Math.max(40, text.length / cps + 8));
      }

      function renderArticle() {
        const t = state.text;
        const i = state.index;
        let html = "";
        for (let k = 0; k < t.length; k++) {
          if (k < i) html += `<span class="done">${escapeHtml(t[k])}</span>`;
          else if (k === i) html += `<span class="current">${escapeHtml(t[k])}</span>`;
          else html += `<span class="todo">${escapeHtml(t[k])}</span>`;
        }
        els.article.innerHTML = html;
        const cur = els.article.querySelector(".current");
        if (cur) {
          const wrap = els.articleWrap;
          const top = cur.offsetTop - wrap.clientHeight * 0.35;
          wrap.scrollTop = Math.max(0, top);
        }
      }

      function renderTyped(extraWrong = "") {
        if (!state.typed && !state.composing && !extraWrong) {
          els.typedBox.innerHTML = `<span class="placeholder">鍦ㄩ敭鐩樹笂杈撳叆鈥?/span>`;
          return;
        }
        let html = `<span class="ok">${escapeHtml(state.typed)}</span>`;
        if (extraWrong) html += `<span class="bad">${escapeHtml(extraWrong)}</span>`;
        if (state.composing) html += `<span class="composing">${escapeHtml(state.composing)}</span>`;
        els.typedBox.innerHTML = html;
      }

      function applyPresence() {
        const n = state.near;
        const edge = Math.min(0.95, n * 1.1);
        els.presence.style.setProperty("--e", String(edge));
        document.documentElement.style.setProperty("--edge", String(edge));
        // side darkness = something behind / beside, not in front
        els.presence.style.background = `radial-gradient(ellipse 80% 55% at 50% 100%, rgba(40,0,0,${n * 0.55}), transparent 70%)`;
        const before = els.presence;
        // use opacity on pseudo via inline on parent filter
        before.style.boxShadow = `inset 0 0 ${80 + n * 120}px rgba(0,0,0,${0.2 + n * 0.45})`;
        const style = document.getElementById("dyn-presence");
        // update pseudo opacity via stylesheet injection
        let tag = document.getElementById("dyn-presence");
        if (!tag) {
          tag = document.createElement("style");
          tag.id = "dyn-presence";
          document.head.appendChild(tag);
        }
        tag.textContent = `
          #behind-presence::before, #behind-presence::after { opacity: ${Math.min(0.95, n * 1.05)}; }
        `;
        // reflection on monitor glass = the only "visible" ghost (behind you)
        els.glass.style.opacity = String(Math.min(0.92, 0.08 + n * 0.9));
        const scale = 0.85 + n * 0.55;
        els.glass.querySelector(".head").style.transform = `translateX(-50%) scale(${scale})`;
        // subtle desk shake when very close behind
        if (n > 0.75) {
          const s = (n - 0.75) * 8;
          els.desk.style.transform = `translate(${(Math.random() - 0.5) * s}px, ${(Math.random() - 0.5) * s * 0.4}px)`;
        } else {
          els.desk.style.transform = "none";
        }
      }

      function syncHud() {
        els.wave.textContent = String(state.wave);
        els.cleared.textContent = String(state.cleared);
        els.ghostCount.textContent = String(state.ghosts);
        els.proximity.textContent = proximityLabel(state.near);
        els.timeLeft.textContent = state.time.toFixed(1);
        els.timerFill.style.transform = `scaleX(${Math.max(0, state.time / state.timeMax)})`;
        applyPresence();
      }

      function focusInput() {
        requestAnimationFrame(() => els.typeInput.focus());
      }

      function commonPrefixLen(a, b) {
        const n = Math.min(a.length, b.length);
        let i = 0;
        while (i < n && a[i] === b[i]) i++;
        return i;
      }

      function onWrong() {
        state.streak = 0;
        state.wrongFlash = 0.5;
        if (state.ghosts < 4 && Math.random() < 0.32 + state.wave * 0.03) {
          state.ghosts += 1;
          state.near = Math.min(0.98, state.near + 0.05);
        } else {
          state.near = Math.min(0.98, state.near + 0.09 + state.wave * 0.008);
        }
        if (state.near >= 1) fail("瀹冧粠妞呰儗鍚庢妸浣犳寜浣忎簡銆?);
      }

      function judgeCommitted(raw) {
        if (!state.running) return;
        const target = state.text;
        const prefix = commonPrefixLen(raw, target);
        const correct = target.slice(0, prefix);
        const wrongTail = raw.slice(prefix);

        if (wrongTail.length > 0) {
          if (raw !== state.lastJudged) {
            onWrong();
            state.lastJudged = raw;
          }
          state.typed = correct;
          state.index = prefix;
          els.typeInput.value = correct;
          renderTyped(wrongTail.slice(0, 12));
          renderArticle();
          syncHud();
          return;
        }

        const gained = prefix - state.index;
        if (gained > 0) {
          state.streak += gained;
          if (state.streak >= 12) {
            state.near = Math.max(0.08, state.near - 0.025);
            state.streak = 0;
          }
        }
        state.typed = correct;
        state.index = prefix;
        state.lastJudged = correct;
        renderTyped();
        renderArticle();
        syncHud();
        if (state.index >= target.length) {
          els.typeInput.value = "";
          completeChapter();
        }
      }

      function startChapter() {
        state.text = pickText();
        state.index = 0;
        state.typed = "";
        state.composing = "";
        state.lastJudged = "";
        state.timeMax = timeFor(state.text);
        state.time = state.timeMax;
        state.streak = 0;
        els.typeInput.value = "";
        els.typeInput.disabled = false;
        els.articleWrap.scrollTop = 0;
        renderArticle();
        renderTyped();
        syncHud();
        focusInput();
      }

      function startGame() {
        state.running = true;
        state.wave = 1;
        state.cleared = 0;
        state.ghosts = 1;
        state.near = 0.12;
        els.overlay.classList.add("hidden");
        els.gameover.classList.add("hidden");
        els.clear.classList.add("hidden");
        startChapter();
      }

      function fail(reason) {
        state.running = false;
        els.typeInput.disabled = true;
        els.goMsg.textContent = reason;
        els.gameover.classList.remove("hidden");
        syncHud();
      }

      function completeChapter() {
        state.cleared++;
        state.typed = "";
        state.composing = "";
        if (state.ghosts > 1) {
          state.ghosts -= 1;
          state.near = Math.max(0.1, state.near - 0.2);
        } else {
          state.near = Math.max(0.05, state.near - 0.32);
          if (state.near < 0.12) {
            state.running = false;
            els.typeInput.disabled = true;
            els.clear.classList.remove("hidden");
            syncHud();
            return;
          }
        }
        startChapter();
      }

      function nextWave() {
        state.wave += 1;
        state.ghosts = Math.min(4, 1 + Math.floor((state.wave - 1) / 2));
        state.near = Math.min(0.32, 0.12 + state.wave * 0.015);
        state.running = true;
        els.clear.classList.add("hidden");
        startChapter();
      }

      els.typeInput.addEventListener("compositionstart", () => {
        state.imeComposing = true;
      });
      els.typeInput.addEventListener("compositionupdate", (e) => {
        state.composing = e.data || "";
        renderTyped();
      });
      els.typeInput.addEventListener("compositionend", (e) => {
        state.imeComposing = false;
        state.composing = "";
        judgeCommitted(e.target.value);
        focusInput();
      });
      els.typeInput.addEventListener("input", (e) => {
        if (state.imeComposing || e.isComposing) {
          const v = e.target.value;
          state.composing = v.startsWith(state.typed) ? v.slice(state.typed.length) : v;
          renderTyped();
          return;
        }
        state.composing = "";
        judgeCommitted(e.target.value);
      });

      document.getElementById("desk-wood").addEventListener("mousedown", (e) => {
        if (e.target !== els.typeInput && state.running) {
          e.preventDefault();
          focusInput();
        }
      });

      let last = performance.now();
      function tick(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        if (state.running) {
          state.time -= dt;
          // passive: the thing behind you creeps closer
          state.near = Math.min(
            1,
            state.near + dt * (0.008 + state.ghosts * 0.0035 + state.wave * 0.0012),
          );
          if (state.wrongFlash > 0) state.wrongFlash = Math.max(0, state.wrongFlash - dt * 1.6);
          if (state.time <= 0) {
            state.time = 0;
            state.near = Math.min(1, state.near + 0.16);
            if (state.near >= 1) fail("浣犳墦寰楀お鎱€傚畠宸茬粡璐村湪浣犺儗鍚庛€?);
            else {
              if (state.ghosts < 4) state.ghosts += 1;
              state.time = Math.max(10, state.timeMax * 0.3);
            }
          }
          if (state.near >= 1) fail("瀹冧粠鍚庨潰纰板埌浣犱簡銆?);
          syncHud();
        }
        requestAnimationFrame(tick);
      }

      document.getElementById("btn-start").onclick = startGame;
      document.getElementById("btn-retry").onclick = startGame;
      document.getElementById("btn-next").onclick = nextWave;

      syncHud();
      requestAnimationFrame(tick);
    </script>
