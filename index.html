<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>不可转头 · 显示屏打字</title>
    <style>
      :root {
        --desk: #1a1410;
        --bezel: #1c1c1e;
        --screen: #0b1210;
        --phosphor: #9af0c0;
        --phosphor-dim: #3d6b52;
        --danger: #c23b3b;
        --text: #d8d2c8;
        --muted: #8a8074;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #050506;
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      /* Room: you face the monitor; ghost stays behind (reflections / periphery only) */
      #room {
        position: relative;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(ellipse 90% 60% at 50% 0%, #1a1010 0%, transparent 55%),
          linear-gradient(180deg, #0c0c10 0%, #15110e 48%, #1a1410 100%);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      /* Peripheral shadow of something behind you — never a face in front */
      #behind-presence {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: transparent;
        transition: background 0.2s linear;
      }
      #behind-presence::before,
      #behind-presence::after {
        content: "";
        position: absolute;
        top: 0;
        width: 18%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.2s linear;
        filter: blur(10px);
      }
      #behind-presence::before {
        left: 0;
        background: linear-gradient(90deg, rgba(20, 0, 0, 0.85), transparent);
      }
      #behind-presence::after {
        right: 0;
        background: linear-gradient(270deg, rgba(20, 0, 0, 0.85), transparent);
      }

      #desk {
        position: relative;
        z-index: 2;
        width: min(920px, 96vw);
        transform-origin: center center;
      }

      #monitor {
        background: linear-gradient(180deg, #2a2a2e, #141416);
        border-radius: 14px 14px 8px 8px;
        padding: 18px 18px 14px;
        box-shadow:
          0 0 0 2px #0a0a0a,
          0 24px 60px rgba(0, 0, 0, 0.65),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      #bezel {
        background: #050806;
        border-radius: 6px;
        padding: 12px;
        border: 1px solid #222;
        position: relative;
      }

      /* Glass reflection: faint silhouette "behind you" appears ON the glass */
      #glass-reflection {
        position: absolute;
        inset: 12px;
        border-radius: 4px;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        background:
          radial-gradient(ellipse 40% 70% at 50% 110%, rgba(200, 200, 200, 0.18), transparent 70%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 40%);
        mix-blend-mode: screen;
        transition: opacity 0.15s linear;
      }
      #glass-reflection .head {
        position: absolute;
        left: 50%;
        bottom: -8%;
        width: 42%;
        height: 55%;
        transform: translateX(-50%);
        background: radial-gradient(ellipse at 50% 30%, rgba(220, 220, 220, 0.22), transparent 68%);
        filter: blur(1px);
      }
      #glass-reflection .eyes {
        position: absolute;
        left: 50%;
        top: 38%;
        width: 28%;
        height: 8px;
        transform: translateX(-50%);
        display: flex;
        justify-content: space-between;
      }
      #glass-reflection .eyes i {
        display: block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(180, 30, 30, 0.55);
        box-shadow: 0 0 8px rgba(180, 30, 30, 0.45);
      }

      #screen {
        position: relative;
        background: var(--screen);
        min-height: min(58vh, 520px);
        max-height: min(58vh, 520px);
        overflow: hidden;
        border-radius: 3px;
        box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.55);
      }
      #screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 2px,
          rgba(0, 0, 0, 0.12) 2px,
          rgba(0, 0, 0, 0.12) 3px
        );
        opacity: 0.35;
        z-index: 4;
      }

      #screen-chrome {
        display: flex;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 11px;
        color: var(--phosphor-dim);
        border-bottom: 1px solid #143022;
        font-family: Consolas, "Cascadia Mono", monospace;
      }
      #screen-chrome b {
        color: var(--phosphor);
        font-weight: 600;
      }
      #screen-chrome .bad b {
        color: #f08080;
      }

      #article-wrap {
        height: calc(100% - 34px);
        overflow: hidden;
        position: relative;
      }
      #article {
        padding: 14px 16px 120px;
        color: var(--phosphor);
        font-size: 17px;
        line-height: 1.75;
        font-family: "Microsoft YaHei UI", "PingFang SC", serif;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #article .done {
        color: #6fbf8f;
      }
      #article .current {
        background: rgba(154, 240, 192, 0.16);
        outline: 1px solid rgba(154, 240, 192, 0.35);
      }
      #article .todo {
        color: var(--phosphor-dim);
      }

      #stand {
        width: 90px;
        height: 18px;
        margin: 0 auto;
        background: #111;
        border-radius: 0 0 4px 4px;
      }
      #base {
        width: 220px;
        height: 12px;
        margin: 0 auto;
        background: #0d0d0d;
        border-radius: 0 0 8px 8px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }
      #desk-wood {
        margin-top: 10px;
        height: 70px;
        background: linear-gradient(180deg, #2a2018, #1a1410 60%, #120e0c);
        border-radius: 4px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        padding: 12px 14px 10px;
      }

      #typed-label {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      #typed-box {
        min-height: 1.6em;
        margin-bottom: 8px;
        font-size: 14px;
        color: #c8c2b8;
        word-break: break-word;
      }
      #typed-box .ok {
        color: #8fbf8f;
      }
      #typed-box .bad {
        color: #ff8a8a;
        text-decoration: underline;
      }
      #typed-box .composing {
        color: #d4c48a;
        border-bottom: 1px dashed #8a7a40;
      }
      #typed-box .placeholder {
        color: #555;
      }

      #type-input {
        width: 100%;
        padding: 10px 12px;
        font-size: 16px;
        color: var(--text);
        background: #0c0a09;
        border: 1px solid #3a322c;
        outline: none;
        font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      }
      #type-input:focus {
        border-color: #8a4030;
      }

      #timer-bar {
        margin-top: 8px;
        height: 3px;
        background: #2a2220;
      }
      #timer-fill {
        height: 100%;
        background: var(--danger);
        transform-origin: left center;
      }

      #lock-note {
        position: absolute;
        left: 50%;
        top: 14px;
        transform: translateX(-50%);
        z-index: 6;
        font-size: 12px;
        letter-spacing: 0.12em;
        color: var(--muted);
        text-shadow: 0 1px 4px #000;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.84);
        display: grid;
        place-items: center;
        z-index: 20;
      }
      .overlay.hidden {
        display: none;
      }
      .card {
        width: min(480px, calc(100vw - 32px));
        background: #101012;
        border: 1px solid #2a2a2e;
        padding: 24px;
      }
      .card h1,
      .card h2 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      .card p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }
      button {
        appearance: none;
        border: 1px solid #3a3a40;
        background: #1c1c22;
        color: var(--text);
        padding: 9px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      button.primary {
        background: #2a1818;
        border-color: #8a3030;
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay">
      <div class="card">
        <h1>不可转头</h1>
        <p>
          你坐在房间里，面对唯一的显示屏。鬼在你<b style="color:#ccc">背后</b>——你看不见它正脸，只能从屏幕反光、墙边阴影感觉到它。
        </p>
        <p>
          屏上是一篇正在加载的房间实录。用中文输入法把文章打完，可以逼它后退或赶走一只。打错，它会靠近，或者再来一个。
        </p>
        <button class="primary" id="btn-start" type="button">坐下，别回头</button>
      </div>
    </div>

    <div class="overlay hidden" id="gameover">
      <div class="card">
        <h2>它从后面碰到你了</h2>
        <p id="go-msg"></p>
        <button class="primary" id="btn-retry" type="button">再坐回去</button>
      </div>
    </div>

    <div class="overlay hidden" id="clear">
      <div class="card">
        <h2>背后安静了一会儿</h2>
        <p>屏幕反光里那个人影淡了。还可以继续下一章实录。</p>
        <button class="primary" id="btn-next" type="button">继续读下去</button>
      </div>
    </div>

    <div id="room">
      <div id="lock-note">视角锁死 · 鬼在你背后 · 只准看屏幕</div>
      <div id="behind-presence"></div>

      <div id="desk">
        <div id="monitor">
          <div id="bezel">
            <div id="glass-reflection">
              <div class="head"></div>
              <div class="eyes"><i></i><i></i></div>
            </div>
            <div id="screen">
              <div id="screen-chrome">
                <span>ROOM_LOG.txt</span>
                <span>章 <b id="wave">1</b></span>
                <span>完成 <b id="cleared">0</b></span>
                <span class="bad">背后 <b id="ghost-count">1</b> 个</span>
                <span class="bad">距离 <b id="proximity">远</b></span>
                <span>剩余 <b id="time-left">0.0</b>s</span>
              </div>
              <div id="article-wrap">
                <div id="article"></div>
              </div>
            </div>
          </div>
          <div id="stand"></div>
          <div id="base"></div>
        </div>

        <div id="desk-wood">
          <div id="typed-label">你打出来的字</div>
          <div id="typed-box"><span class="placeholder">在键盘上输入…</span></div>
          <input
            id="type-input"
            type="text"
            lang="zh-CN"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="用中文输入法在这里打字"
          />
          <div id="timer-bar"><div id="timer-fill"></div></div>
        </div>
      </div>
    </div>

    <script>
      /**
       * Long ghost-story chapters: what the thing behind you is doing in the room.
       * Player types the article shown on the monitor.
       */
      const CHAPTERS = [
        "你坐在书桌前，显示器是房间里唯一的光源。背后的门缝里，先是一股凉气，然后是布料摩擦木地板的声音。它没有开门——门一直关着。它像是从门缝里一点点挤进来的，肩膀比门缝宽，却还是进来了。你听见它在你背后站定，呼吸很轻，像怕吵醒谁。衣架轻晃了一下，那件昨天挂上的外套被掀起一角，又慢慢放下。它绕过床尾，手指在墙壁上点着走，每一下都正好落在你心跳的空拍里。你盯着屏幕，屏幕玻璃里有一个模糊的轮廓，正从你椅背后面升高。不要转头。把这一段打完，它或许会退到墙角去。",
        "它开始整理你的房间，动作慢得近乎礼貌。抽屉被拉开又合上，不是翻找，更像清点。你的闹钟被它拨慢了三分钟。窗台上的杯子转了半圈，杯口对准你的后颈。它在你身后蹲下来，你感觉到椅腿旁边有两团更冷的空气。它似乎在看你屏幕上的字，跟着你的光标轻轻点头。有一瞬间，反光里那张脸凑得很近，鼻尖几乎贴上玻璃内侧——不对，玻璃内侧不该有雾。雾是从你这边哈出去的。它在你背后也哈了一口气，两团雾在屏幕上叠成一只眼睛。继续打。打完这段，让其中一只眼睛先消失。",
        "书架第三层被抽空了一本书，那本书现在摊在你枕头上，页脚朝向房门。它在读你的笔记，用指甲当书签。指甲很长，刮纸的声音细得像蚊子。你的台灯忽然亮了又灭，开关自己弹了一下。它不喜欢灯，却很喜欢显示器——因为你看着显示器时，后背会完全暴露。它把脸贴近你的后脑勺，没有碰到你，只是量距离。一掌。半掌。三指。你打错一个字，它就笑出声，笑声从牙缝里挤出来，像漏风的暖气管。把这一章打正确，逼它退回半掌之外。",
        "衣柜门开了一条缝。缝里不是衣服，是站着的人的厚度。它侧着身挤进衣柜，又觉得太挤，于是把里面的衣架一根根掰弯，给自己腾地方。你听见金属尖叫。同时，你椅背被轻轻按了一下，像有人确认你还坐着。它从衣柜里伸出一只手，指尖悬在你肩膀上方，迟迟不落下。屏幕反光里，你看见那只手的倒影盖住了你正在打的那一行字。别眨眼。把字从它手指底下救出来。打完这段，那只手会缩回去——至少缩回衣柜门后。",
        "它开始模仿你。你敲键盘，它在床板上用指甲敲同样的节奏。你停，它停。你深吸一口气，它也吸，却把气吐在你后领窝里，又湿又冷。地板上多了第二双拖鞋印，尺寸和你的一样，方向却冲着你的后跟。它躺到你的被子里，把被子拉到下巴，眼睛睁着对着你的后脑。你能感觉到被褥的重量变得不对：多了一个人的份。屏幕右下角的系统时间跳了一下，多出来四十秒——那四十秒里发生的事，你没看见，因为你不能转头。把这段实录敲完，把那四十秒买回来。",
        "它走到你左侧，你余光里墙变黑了一块。它走到右侧，窗帘鼓起来，却没有风。它最终又回到你正后方，双手搭上椅背，大拇指几乎碰到你的肩胛。显示器里的人影终于清晰：没有五官，只有两个凹陷，凹陷底部很红。它在学你打字的内容，嘴唇无声开合，比你快一个字。你若打错，它就超前；你若连续正确，它的嘴会对不上，开始烦躁，椅背吱呀作响。烦躁对你有利。稳住，把这一整段打完，让它的嘴唇追不上你。",
        "天花板的烟感器被拧松了半圈。它爬上去过，灰尘落在你键盘缝里，灰是湿的。它从梁上倒挂着看你，头发——如果那是头发——垂下来扫过你的后颈，像细绳量体温。你起了一层鸡皮疙瘩，它似乎很满意，把绳子又放低一点。门把手慢慢转了一下，又转回去，像有人在门外配合演出。房间里其实只有你，和你背后那一个。或许不止一个。屏幕反光里，轮廓的肩膀旁又鼓起第二道弧线。打完这段，先消掉后来的那一个。",
        "它把你的手机点亮了，屏幕朝下扣在床上，震动却一直不停。来电显示是你自己的号码。你没有接——你也不能回头去接。它替你接了，把手机贴在自己耳边，对空气说：他还在打字。然后把手机放回原处，锁屏画面多了一张照片：你的后脑勺，焦距很近。照片时间戳是一分钟后。也就是说，它已经知道一分钟后你会怎样。除非你把这段字在一分钟内刻进屏幕，改掉结局。别停。",
      ];

      const els = {
        overlay: document.getElementById("overlay"),
        gameover: document.getElementById("gameover"),
        clear: document.getElementById("clear"),
        article: document.getElementById("article"),
        articleWrap: document.getElementById("article-wrap"),
        typedBox: document.getElementById("typed-box"),
        typeInput: document.getElementById("type-input"),
        wave: document.getElementById("wave"),
        cleared: document.getElementById("cleared"),
        ghostCount: document.getElementById("ghost-count"),
        proximity: document.getElementById("proximity"),
        timeLeft: document.getElementById("time-left"),
        timerFill: document.getElementById("timer-fill"),
        presence: document.getElementById("behind-presence"),
        glass: document.getElementById("glass-reflection"),
        desk: document.getElementById("desk"),
        goMsg: document.getElementById("go-msg"),
      };

      const state = {
        running: false,
        wave: 1,
        cleared: 0,
        text: "",
        index: 0,
        typed: "",
        composing: "",
        ghosts: 1,
        near: 0.14,
        time: 0,
        timeMax: 0,
        streak: 0,
        wrongFlash: 0,
        imeComposing: false,
        lastJudged: "",
      };

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function proximityLabel(n) {
        if (n < 0.22) return "在墙角";
        if (n < 0.4) return "在房间里";
        if (n < 0.58) return "靠近椅背";
        if (n < 0.78) return "贴着后颈";
        return "伸手可及";
      }

      function pickText() {
        return CHAPTERS[(state.wave - 1 + state.cleared) % CHAPTERS.length];
      }

      function timeFor(text) {
        const cps = Math.max(1.15, 1.65 - state.wave * 0.06);
        return Math.min(120, Math.max(40, text.length / cps + 8));
      }

      function renderArticle() {
        const t = state.text;
        const i = state.index;
        let html = "";
        for (let k = 0; k < t.length; k++) {
          if (k < i) html += `<span class="done">${escapeHtml(t[k])}</span>`;
          else if (k === i) html += `<span class="current">${escapeHtml(t[k])}</span>`;
          else html += `<span class="todo">${escapeHtml(t[k])}</span>`;
        }
        els.article.innerHTML = html;
        const cur = els.article.querySelector(".current");
        if (cur) {
          const wrap = els.articleWrap;
          const top = cur.offsetTop - wrap.clientHeight * 0.35;
          wrap.scrollTop = Math.max(0, top);
        }
      }

      function renderTyped(extraWrong = "") {
        if (!state.typed && !state.composing && !extraWrong) {
          els.typedBox.innerHTML = `<span class="placeholder">在键盘上输入…</span>`;
          return;
        }
        let html = `<span class="ok">${escapeHtml(state.typed)}</span>`;
        if (extraWrong) html += `<span class="bad">${escapeHtml(extraWrong)}</span>`;
        if (state.composing) html += `<span class="composing">${escapeHtml(state.composing)}</span>`;
        els.typedBox.innerHTML = html;
      }

      function applyPresence() {
        const n = state.near;
        const edge = Math.min(0.95, n * 1.1);
        els.presence.style.setProperty("--e", String(edge));
        document.documentElement.style.setProperty("--edge", String(edge));
        // side darkness = something behind / beside, not in front
        els.presence.style.background = `radial-gradient(ellipse 80% 55% at 50% 100%, rgba(40,0,0,${n * 0.55}), transparent 70%)`;
        const before = els.presence;
        // use opacity on pseudo via inline on parent filter
        before.style.boxShadow = `inset 0 0 ${80 + n * 120}px rgba(0,0,0,${0.2 + n * 0.45})`;
        const style = document.getElementById("dyn-presence");
        // update pseudo opacity via stylesheet injection
        let tag = document.getElementById("dyn-presence");
        if (!tag) {
          tag = document.createElement("style");
          tag.id = "dyn-presence";
          document.head.appendChild(tag);
        }
        tag.textContent = `
          #behind-presence::before, #behind-presence::after { opacity: ${Math.min(0.95, n * 1.05)}; }
        `;
        // reflection on monitor glass = the only "visible" ghost (behind you)
        els.glass.style.opacity = String(Math.min(0.92, 0.08 + n * 0.9));
        const scale = 0.85 + n * 0.55;
        els.glass.querySelector(".head").style.transform = `translateX(-50%) scale(${scale})`;
        // subtle desk shake when very close behind
        if (n > 0.75) {
          const s = (n - 0.75) * 8;
          els.desk.style.transform = `translate(${(Math.random() - 0.5) * s}px, ${(Math.random() - 0.5) * s * 0.4}px)`;
        } else {
          els.desk.style.transform = "none";
        }
      }

      function syncHud() {
        els.wave.textContent = String(state.wave);
        els.cleared.textContent = String(state.cleared);
        els.ghostCount.textContent = String(state.ghosts);
        els.proximity.textContent = proximityLabel(state.near);
        els.timeLeft.textContent = state.time.toFixed(1);
        els.timerFill.style.transform = `scaleX(${Math.max(0, state.time / state.timeMax)})`;
        applyPresence();
      }

      function focusInput() {
        requestAnimationFrame(() => els.typeInput.focus());
      }

      function commonPrefixLen(a, b) {
        const n = Math.min(a.length, b.length);
        let i = 0;
        while (i < n && a[i] === b[i]) i++;
        return i;
      }

      function onWrong() {
        state.streak = 0;
        state.wrongFlash = 0.5;
        if (state.ghosts < 4 && Math.random() < 0.32 + state.wave * 0.03) {
          state.ghosts += 1;
          state.near = Math.min(0.98, state.near + 0.05);
        } else {
          state.near = Math.min(0.98, state.near + 0.09 + state.wave * 0.008);
        }
        if (state.near >= 1) fail("它从椅背后把你按住了。");
      }

      function judgeCommitted(raw) {
        if (!state.running) return;
        const target = state.text;
        const prefix = commonPrefixLen(raw, target);
        const correct = target.slice(0, prefix);
        const wrongTail = raw.slice(prefix);

        if (wrongTail.length > 0) {
          if (raw !== state.lastJudged) {
            onWrong();
            state.lastJudged = raw;
          }
          state.typed = correct;
          state.index = prefix;
          els.typeInput.value = correct;
          renderTyped(wrongTail.slice(0, 12));
          renderArticle();
          syncHud();
          return;
        }

        const gained = prefix - state.index;
        if (gained > 0) {
          state.streak += gained;
          if (state.streak >= 12) {
            state.near = Math.max(0.08, state.near - 0.025);
            state.streak = 0;
          }
        }
        state.typed = correct;
        state.index = prefix;
        state.lastJudged = correct;
        renderTyped();
        renderArticle();
        syncHud();
        if (state.index >= target.length) {
          els.typeInput.value = "";
          completeChapter();
        }
      }

      function startChapter() {
        state.text = pickText();
        state.index = 0;
        state.typed = "";
        state.composing = "";
        state.lastJudged = "";
        state.timeMax = timeFor(state.text);
        state.time = state.timeMax;
        state.streak = 0;
        els.typeInput.value = "";
        els.typeInput.disabled = false;
        els.articleWrap.scrollTop = 0;
        renderArticle();
        renderTyped();
        syncHud();
        focusInput();
      }

      function startGame() {
        state.running = true;
        state.wave = 1;
        state.cleared = 0;
        state.ghosts = 1;
        state.near = 0.12;
        els.overlay.classList.add("hidden");
        els.gameover.classList.add("hidden");
        els.clear.classList.add("hidden");
        startChapter();
      }

      function fail(reason) {
        state.running = false;
        els.typeInput.disabled = true;
        els.goMsg.textContent = reason;
        els.gameover.classList.remove("hidden");
        syncHud();
      }

      function completeChapter() {
        state.cleared++;
        state.typed = "";
        state.composing = "";
        if (state.ghosts > 1) {
          state.ghosts -= 1;
          state.near = Math.max(0.1, state.near - 0.2);
        } else {
          state.near = Math.max(0.05, state.near - 0.32);
          if (state.near < 0.12) {
            state.running = false;
            els.typeInput.disabled = true;
            els.clear.classList.remove("hidden");
            syncHud();
            return;
          }
        }
        startChapter();
      }

      function nextWave() {
        state.wave += 1;
        state.ghosts = Math.min(4, 1 + Math.floor((state.wave - 1) / 2));
        state.near = Math.min(0.32, 0.12 + state.wave * 0.015);
        state.running = true;
        els.clear.classList.add("hidden");
        startChapter();
      }

      els.typeInput.addEventListener("compositionstart", () => {
        state.imeComposing = true;
      });
      els.typeInput.addEventListener("compositionupdate", (e) => {
        state.composing = e.data || "";
        renderTyped();
      });
      els.typeInput.addEventListener("compositionend", (e) => {
        state.imeComposing = false;
        state.composing = "";
        judgeCommitted(e.target.value);
        focusInput();
      });
      els.typeInput.addEventListener("input", (e) => {
        if (state.imeComposing || e.isComposing) {
          const v = e.target.value;
          state.composing = v.startsWith(state.typed) ? v.slice(state.typed.length) : v;
          renderTyped();
          return;
        }
        state.composing = "";
        judgeCommitted(e.target.value);
      });

      document.getElementById("desk-wood").addEventListener("mousedown", (e) => {
        if (e.target !== els.typeInput && state.running) {
          e.preventDefault();
          focusInput();
        }
      });

      let last = performance.now();
      function tick(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        if (state.running) {
          state.time -= dt;
          // passive: the thing behind you creeps closer
          state.near = Math.min(
            1,
            state.near + dt * (0.008 + state.ghosts * 0.0035 + state.wave * 0.0012),
          );
          if (state.wrongFlash > 0) state.wrongFlash = Math.max(0, state.wrongFlash - dt * 1.6);
          if (state.time <= 0) {
            state.time = 0;
            state.near = Math.min(1, state.near + 0.16);
            if (state.near >= 1) fail("你打得太慢。它已经贴在你背后。");
            else {
              if (state.ghosts < 4) state.ghosts += 1;
              state.time = Math.max(10, state.timeMax * 0.3);
            }
          }
          if (state.near >= 1) fail("它从后面碰到你了。");
          syncHud();
        }
        requestAnimationFrame(tick);
      }

      document.getElementById("btn-start").onclick = startGame;
      document.getElementById("btn-retry").onclick = startGame;
      document.getElementById("btn-next").onclick = nextWave;

      syncHud();
      requestAnimationFrame(tick);
    </script>
  </body>
</html>
