<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>不可转头 · 卡通版</title>
    <style>
      :root {
        --bg: #070708;
        --panel: #121214;
        --text: #e6e2da;
        --muted: #8a857c;
        --danger: #c23b3b;
        --ok: #6a9e6a;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      #stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      #topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 12px 18px;
        border-bottom: 1px solid #222;
        background: #0c0c0e;
        z-index: 5;
      }
      #topbar .stat {
        font-size: 12px;
        color: var(--muted);
      }
      #topbar .stat b {
        color: var(--text);
        font-weight: 600;
      }
      #topbar .danger b {
        color: var(--danger);
      }
      #ng-badge {
        font-size: 11px;
        padding: 2px 8px;
        border: 1px solid #8a3030;
        color: #f0a0a0;
        background: #1a1010;
      }
      #ng-badge.hidden {
        display: none;
      }
      #viewport {
        position: relative;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 40%, #141416 0%, #070708 70%);
      }
      #ghost-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .ghost {
        position: absolute;
        left: 50%;
        top: 42%;
        transform: translate(-50%, -50%);
        opacity: 0;
        will-change: transform, opacity, filter;
      }
      .ghost svg {
        display: block;
        width: 100%;
        height: auto;
      }
      #vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 35%, rgba(0, 0, 0, 0.55) 100%);
        z-index: 2;
      }
      #threat-flash {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: rgba(140, 20, 20, 0);
        z-index: 3;
      }
      #lock-note {
        position: absolute;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.08em;
        z-index: 4;
      }
      #type-panel {
        padding: 14px 18px 18px;
        background: var(--panel);
        border-top: 1px solid #222;
        z-index: 5;
      }
      #prompt-label,
      #typed-label {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
        letter-spacing: 0.06em;
      }
      #prompt {
        font-size: 20px;
        line-height: 1.65;
        word-break: break-word;
        min-height: 2.8em;
        margin-bottom: 10px;
        font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      }
      #prompt .done {
        color: var(--ok);
      }
      #prompt .current {
        background: #2a2a22;
        color: #fff8e7;
        outline: 1px solid #5a5340;
      }
      #prompt .todo {
        color: var(--muted);
      }
      #prompt .ink {
        background: #111;
        color: #111;
        border-radius: 2px;
      }
      #prompt .trap {
        position: relative;
        color: #c07070;
      }
      #prompt .trap-x {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -55%);
        color: #ff4d4d;
        font-size: 1.1em;
        font-weight: 700;
        pointer-events: none;
        text-shadow: 0 0 4px #400;
      }
      #typed-box {
        margin-bottom: 8px;
        padding: 10px 12px;
        min-height: 2.2em;
        background: #0a0a0c;
        border: 1px solid #2a2a2e;
        font-size: 17px;
        line-height: 1.5;
        word-break: break-word;
      }
      #typed-box .ok {
        color: var(--ok);
      }
      #typed-box .bad {
        color: #ff8a8a;
        text-decoration: underline;
      }
      #typed-box .composing {
        color: #d4c48a;
        border-bottom: 1px dashed #8a7a40;
      }
      #typed-box .placeholder {
        color: #555;
      }
      #type-input {
        width: 100%;
        margin-bottom: 8px;
        padding: 10px 12px;
        font-size: 17px;
        color: var(--text);
        background: #0e0e10;
        border: 1px solid #3a3a40;
        outline: none;
        font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      }
      #type-input:focus {
        border-color: #8a3030;
      }
      #meta {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        font-size: 12px;
        color: var(--muted);
      }
      #timer-bar {
        margin-top: 8px;
        height: 4px;
        background: #222;
      }
      #timer-fill {
        height: 100%;
        background: var(--danger);
        transform-origin: left center;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        display: grid;
        place-items: center;
        z-index: 20;
      }
      .overlay.hidden {
        display: none;
      }
      .card {
        width: min(500px, calc(100vw - 32px));
        background: #101012;
        border: 1px solid #2a2a2e;
        padding: 22px;
      }
      .card h1,
      .card h2 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      .card p,
      .card li {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }
      .card ul {
        margin: 0 0 14px;
        padding-left: 1.2em;
      }
      button {
        appearance: none;
        border: 1px solid #3a3a40;
        background: #1c1c22;
        color: var(--text);
        padding: 9px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      button.primary {
        background: #2a1818;
        border-color: #8a3030;
      }
      #shake {
        width: 100%;
        height: 100%;
      }
      #ver-switch {
        position: fixed;
        right: 14px;
        bottom: 14px;
        z-index: 30;
        padding: 10px 12px;
        background: #1a1a22;
        border: 1px solid #444;
        color: var(--text);
        text-decoration: none;
        font-size: 13px;
      }
      #ver-switch:hover {
        border-color: #888;
      }
    </style>
  </head>
  <body>
    <a id="ver-switch" href="monitor.html">切换真人版</a>

    <div class="overlay" id="overlay">
      <div class="card">
        <h1>不可转头 · 卡通版</h1>
        <p>鬼在屏幕正前方逼近。用中文输入法打字逼退它们。</p>
        <ul>
          <li><b>涂黑字</b>：前一个字打出后才显示，请记住上下文。</li>
          <li><b>打叉字</b>：绝对不能打对；打对/打错都会招鬼。用<strong>空格跳过</strong>。</li>
          <li><b>凑字数</b>：即使打错，累计字数够一段也能过关（没被抓住的话）。</li>
          <li><b>二周目</b>：通关一次后，每打对一字，文末会多涂黑一个字（打错不涂）。</li>
        </ul>
        <button class="primary" id="btn-start" type="button">面对它</button>
      </div>
    </div>

    <div class="overlay hidden" id="gameover">
      <div class="card">
        <h2>它碰到你了</h2>
        <p id="go-msg"></p>
        <button class="primary" id="btn-retry" type="button">再来一次</button>
      </div>
    </div>

    <div class="overlay hidden" id="clear">
      <div class="card">
        <h2>暂时安全</h2>
        <p id="clear-hint">你清空了视野里的鬼。</p>
        <button class="primary" id="btn-next" type="button">继续</button>
      </div>
    </div>

    <div id="shake">
      <div id="stage">
        <div id="topbar">
          <div class="stat">波次 <b id="wave">1</b></div>
          <div class="stat">完成 <b id="cleared">0</b></div>
          <div class="stat">字数 <b id="fill-stat">0/0</b></div>
          <div class="stat danger">鬼 <b id="ghost-count">1</b></div>
          <div class="stat danger">距离 <b id="proximity">远</b></div>
          <div id="ng-badge" class="hidden">二周目 · 末尾涂黑</div>
        </div>

        <div id="viewport">
          <div id="ghost-layer"></div>
          <div id="vignette"></div>
          <div id="threat-flash"></div>
          <div id="lock-note">视角已锁定 · 打叉字按空格跳过</div>
        </div>

        <div id="type-panel">
          <div id="prompt-label">目标段落</div>
          <div id="prompt"></div>
          <div id="typed-label">你打出来的字</div>
          <div id="typed-box"><span class="placeholder">在下面输入…</span></div>
          <input
            id="type-input"
            type="text"
            lang="zh-CN"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="中文输入法打字；打叉字按空格跳过"
          />
          <div id="meta">
            <span>进度 <b id="progress">0%</b></span>
            <span>剩余 <b id="time-left">0.0</b>s</span>
            <span>连击 <b id="streak">0</b></span>
          </div>
          <div id="timer-bar"><div id="timer-fill"></div></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { createGameController } from "./mechanics.js";

      const PARAS = [
        "别回头。灯在抖，走廊尽头有人站着，可你明明锁了门。",
        "键盘是唯一还听你话的东西。打完这段，它就会退一步。",
        "呼吸声越来越近。不要看屏幕边缘，盯着字，一个一个敲下去。",
        "你听过那种擦玻璃的声音吗？从内侧。从你背后。但你不能转头。",
        "名字被反复叫了三次。第四次你不该回答，你该打完这些字。",
        "影子比人先到。打错一个字母，影子就浓一分。",
        "计时器比心跳还快。段落结束时，至少会少一张脸。",
        "它只会在屏幕上出现。这是安慰，也是诅咒。你的脖子不许动。",
        "地板在响，像有人用指甲量你的距离。继续打，别停。",
        "有人在你耳边数数。你要数的是字母，不是脚步。",
        "窗外没有风，窗帘却动了。字打完之前，假装那是错觉。",
        "你越害怕，手指越滑。冷静。正确比速度更能救你。",
      ];

      const dom = {
        overlay: document.getElementById("overlay"),
        gameover: document.getElementById("gameover"),
        clear: document.getElementById("clear"),
        clearHint: document.getElementById("clear-hint"),
        prompt: document.getElementById("prompt"),
        typedBox: document.getElementById("typed-box"),
        typeInput: document.getElementById("type-input"),
        wave: document.getElementById("wave"),
        cleared: document.getElementById("cleared"),
        ghostCount: document.getElementById("ghost-count"),
        proximity: document.getElementById("proximity"),
        progress: document.getElementById("progress"),
        timeLeft: document.getElementById("time-left"),
        streak: document.getElementById("streak"),
        timerFill: document.getElementById("timer-fill"),
        fillStat: document.getElementById("fill-stat"),
        ngBadge: document.getElementById("ng-badge"),
        goMsg: document.getElementById("go-msg"),
        ghostLayer: document.getElementById("ghost-layer"),
        flash: document.getElementById("threat-flash"),
        shake: document.getElementById("shake"),
      };

      function ghostSvg(seed) {
        const eyeY = 70 + (seed % 5);
        return `<svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="100" cy="230" rx="70" ry="18" fill="rgba(0,0,0,0.45)"/>
          <path d="M40 90 Q40 20 100 18 Q160 20 160 90 L168 210 Q140 185 100 210 Q60 185 32 210 Z"
            fill="rgba(210,210,210,0.14)" stroke="rgba(220,220,220,0.35)" stroke-width="2"/>
          <circle cx="78" cy="${eyeY}" r="6" fill="rgba(200,40,40,0.85)"/>
          <circle cx="122" cy="${eyeY}" r="6" fill="rgba(200,40,40,0.85)"/>
          <path d="M85 120 Q100 135 115 120" fill="none" stroke="rgba(180,180,180,0.35)" stroke-width="2"/>
        </svg>`;
      }

      function renderGhosts(state) {
        dom.ghostLayer.innerHTML = "";
        const n = state.ghosts;
        for (let i = 0; i < n; i++) {
          const g = document.createElement("div");
          g.className = "ghost";
          const offsetX = (i - (n - 1) / 2) * (28 + state.near * 20);
          const scale = 0.35 + state.near * 2.4 + i * 0.04;
          const opacity = Math.min(0.95, 0.12 + state.near * 0.85);
          const blur = Math.max(0, 4 - state.near * 6);
          g.style.width = `${Math.min(520, 140 + scale * 160)}px`;
          g.style.transform = `translate(calc(-50% + ${offsetX}px), -50%) scale(${scale})`;
          g.style.opacity = String(opacity);
          g.style.filter = `blur(${blur}px)`;
          g.innerHTML = ghostSvg(i + state.wave);
          dom.ghostLayer.appendChild(g);
        }
        const shake = state.near > 0.7 ? (state.near - 0.7) * 14 : 0;
        dom.shake.style.transform =
          shake > 0
            ? `translate(${(Math.random() - 0.5) * shake}px, ${(Math.random() - 0.5) * shake}px)`
            : "none";
        dom.flash.style.background =
          state.wrongFlash > 0
            ? `rgba(140, 20, 20, ${Math.min(0.35, state.wrongFlash)})`
            : state.near > 0.8
              ? `rgba(80, 0, 0, ${(state.near - 0.8) * 0.9})`
              : "rgba(140, 20, 20, 0)";
      }

      const game = createGameController({
        paragraphs: PARAS,
        getEls: () => dom,
        onHud: (state) => renderGhosts(state),
      });

      game.bindInput();
      document.getElementById("btn-start").onclick = () => game.startGame();
      document.getElementById("btn-retry").onclick = () => game.startGame();
      document.getElementById("btn-next").onclick = () => game.nextWave();

      document.getElementById("type-panel").addEventListener("mousedown", (e) => {
        if (e.target !== dom.typeInput && game.state.running) {
          e.preventDefault();
          dom.typeInput.focus();
        }
      });

      let last = performance.now();
      function loop(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        game.tick(dt);
        requestAnimationFrame(loop);
      }
      game.syncHud();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
